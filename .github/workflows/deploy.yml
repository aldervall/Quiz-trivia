name: CI/CD Pipeline

on:
  push:
    branches: [main]

# Queue (don't cancel) — a mid-deploy cancellation leaves the server in broken state
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── Job 1: Unit Tests ──────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm test

  # ── Job 2: Bump Version & Publish Image ────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push version bump commit back to main
      packages: write   # push image to ghcr.io

    outputs:
      version: ${{ steps.version.outputs.version }}
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Bump patch version
        id: version
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          npm version patch --no-git-tag-version
          npm install --package-lock-only

          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          git add package.json package-lock.json
          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git push

      - name: Set image name (lowercase for ghcr.io)
        id: meta
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.version.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Server ────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Headscale VPN
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.HEADSCALE_AUTHKEY }}
          args: --login-server=https://hs.aldervall.se

      - name: Pull image & restart container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            IMAGE="${{ needs.build-and-push.outputs.image }}"
            VERSION="${{ needs.build-and-push.outputs.version }}"

            echo "==> Pulling ${IMAGE}:${VERSION}"
            docker pull "${IMAGE}:${VERSION}"

            echo "==> Stopping old container"
            docker stop small-hours 2>/dev/null || true
            docker rm   small-hours 2>/dev/null || true

            echo "==> Starting ${VERSION}"
            ENV_FLAG=""
            [ -f /opt/small-hours/.env ] && ENV_FLAG="--env-file /opt/small-hours/.env"

            docker run -d \
              --name small-hours \
              --restart unless-stopped \
              --network host \
              --memory 512m \
              --cpus 1.0 \
              $ENV_FLAG \
              --mount type=bind,source=/opt/small-hours/data,target=/app/data \
              --mount type=bind,source=/opt/small-hours/certs,target=/app/certs,readonly \
              --health-cmd 'wget -q --spider http://localhost:3000/health || exit 1' \
              --health-interval 30s \
              --health-timeout 5s \
              --health-retries 3 \
              --health-start-period 10s \
              --log-driver json-file \
              --log-opt max-size=10m \
              --log-opt max-file=3 \
              "${IMAGE}:${VERSION}"

            echo "==> Waiting for healthy (up to 60s)"
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' small-hours 2>/dev/null)
              [ "$STATUS" = "healthy" ] && echo "Healthy after ${i}x5s" && break
              echo "  attempt $i/12: ${STATUS:-starting}"
              sleep 5
            done

            FINAL=$(docker inspect --format='{{.State.Health.Status}}' small-hours 2>/dev/null)
            if [ "$FINAL" != "healthy" ]; then
              echo "ERROR: not healthy. Last 50 log lines:"
              docker logs small-hours --tail 50
              exit 1
            fi

            echo "==> Pruning old images (keep last 3 versions)"
            docker images "${IMAGE}" --format '{{.Tag}} {{.ID}}' \
              | grep -v latest \
              | sort -V -r \
              | awk 'NR>3 {print $2}' \
              | xargs -r docker rmi --force 2>/dev/null || true

            echo "==> Done: ${IMAGE}:${VERSION}"
