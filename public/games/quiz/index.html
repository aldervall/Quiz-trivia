<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Quiz — Small Hours</title>
  <link rel="stylesheet" href="/shared/theme.css">
  <style>
    :root {
      --bg: #0f0f23;
      --surface: #1a1a3e;
      --text: #f5f5f7;
      --text-dim: #b0b0c0;
      --accent: #ff8906;
      --accent-glow: rgba(255, 137, 6, 0.2);
      --red: #e21b3c;
      --blue: #1368ce;
      --yellow: #d89e00;
      --green: #26890c;
      --correct: #4ade80;
      --wrong: #ff5555;
      --radius: 16px;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #1a0f3e 100%);
      color: var(--text);
      overflow: hidden;
      position: fixed;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      padding: 0;
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* SCREEN MANAGEMENT */
    /* ═══════════════════════════════════════════════════════════════════════ */
    .screen {
      display: none;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      overflow: hidden;
      animation: fadeIn 0.4s ease-out;
    }

    .screen.active {
      display: flex;
      z-index: 10;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* HEADER */
    /* ═══════════════════════════════════════════════════════════════════════ */
    .header {
      padding: max(1rem, env(safe-area-inset-top)) clamp(1rem, 5vw, 1.5rem) 1rem;
      background: linear-gradient(135deg, var(--surface) 0%, rgba(26, 26, 62, 0.8) 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 20;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 0 1 auto;
      font-size: clamp(0.8rem, 3vw, 0.95rem);
    }

    .header-center {
      flex: 1;
      text-align: center;
      font-size: clamp(1.2rem, 4vw, 1.5rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, var(--accent), #00eaff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-family: 'Courier New', monospace;
      min-width: 60px;
    }

    .header-right {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex: 0 1 auto;
    }

    .score-badge {
      font-size: clamp(0.85rem, 3vw, 1rem);
      font-weight: 700;
      padding: 0.5rem clamp(0.75rem, 2vw, 1rem);
      background: rgba(255, 137, 6, 0.15);
      border: 1px solid rgba(255, 137, 6, 0.4);
      border-radius: 12px;
      color: var(--accent);
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* READY SCREEN */
    /* ═══════════════════════════════════════════════════════════════════════ */
    #ready-screen {
      align-items: center;
      justify-content: center;
      padding: clamp(1.5rem, 5vw, 2.5rem);
      gap: 2rem;
      text-align: center;
    }

    .ready-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .ready-icon {
      font-size: clamp(3rem, 15vw, 5rem);
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .ready-title {
      font-size: clamp(1.8rem, 8vw, 3rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .ready-subtitle {
      font-size: clamp(1rem, 4vw, 1.3rem);
      color: var(--text-dim);
      font-weight: 600;
    }

    .countdown {
      font-size: clamp(2rem, 10vw, 4rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), #00eaff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* QUESTION SCREEN */
    /* ═══════════════════════════════════════════════════════════════════════ */
    #question-screen {
      padding: clamp(1rem, 3vw, 1.5rem);
      gap: 1.5rem;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: clamp(2rem, 5vh, 3rem);
    }

    /* ─ Question Counter ─ */
    .question-counter {
      font-size: clamp(0.8rem, 3vw, 0.95rem);
      color: var(--text-dim);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 0.25rem;
    }

    /* ─ Timer ─ */
    .timer-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin: 1rem 0;
    }

    .timer-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .timer-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--green), var(--yellow), var(--red));
      border-radius: 4px;
      transition: width 0.1s linear;
    }

    .timer-text {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 900;
      font-family: 'Courier New', monospace;
      min-width: 80px;
      text-align: center;
    }

    .timer-text.warning {
      animation: pulse 0.5s ease-in-out infinite;
    }

    /* ─ Question Text ─ */
    .question-text {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 800;
      line-height: 1.3;
      padding: 1rem;
      background: linear-gradient(135deg, rgba(255, 137, 6, 0.08), rgba(0, 234, 255, 0.04));
      border: 1px solid rgba(255, 137, 6, 0.2);
      border-radius: var(--radius);
      margin: 1rem 0;
    }

    /* ─ Answer Buttons ─ */
    .answers-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(0.75rem, 3vw, 1.25rem);
      margin: 1.5rem 0;
    }

    .answer-btn {
      position: relative;
      padding: clamp(1rem, 3vw, 1.5rem);
      min-height: 48px;
      border: none;
      border-radius: var(--radius);
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .answer-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.4s, height 0.4s;
    }

    .answer-btn:active::before {
      width: 300px;
      height: 300px;
    }

    .answer-btn:active {
      transform: scale(0.96);
    }

    .answer-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Answer color variants */
    .answer-btn.a {
      background: linear-gradient(135deg, var(--red), #cc1028);
    }

    .answer-btn.b {
      background: linear-gradient(135deg, var(--blue), #0d4ba3);
    }

    .answer-btn.c {
      background: linear-gradient(135deg, var(--yellow), #b87800);
    }

    .answer-btn.d {
      background: linear-gradient(135deg, var(--green), #1d5f07);
    }

    /* Answer feedback */
    .answer-btn.correct {
      background: linear-gradient(135deg, var(--correct), #22c55e);
      box-shadow: 0 0 40px rgba(74, 222, 128, 0.4);
    }

    .answer-btn.wrong {
      background: linear-gradient(135deg, var(--wrong), #ff3333);
      box-shadow: 0 0 40px rgba(255, 85, 85, 0.4);
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .answer-text {
      position: relative;
      z-index: 1;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    /* ─ Power-ups ─ */
    .powerups-section {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .powerup-btn {
      padding: 0.75rem clamp(1rem, 3vw, 1.25rem);
      min-height: 44px;
      border: 2px solid rgba(255, 137, 6, 0.4);
      border-radius: 12px;
      background: rgba(255, 137, 6, 0.08);
      color: var(--accent);
      font-size: clamp(0.85rem, 3vw, 1rem);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .powerup-btn:active {
      background: rgba(255, 137, 6, 0.15);
      transform: scale(0.96);
    }

    .powerup-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: rgba(255, 255, 255, 0.1);
      color: var(--text-dim);
    }

    .powerup-icon {
      font-size: 1.1rem;
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* GAME OVER SCREEN */
    /* ═══════════════════════════════════════════════════════════════════════ */
    #game-over-screen {
      align-items: center;
      justify-content: center;
      padding: clamp(2rem, 5vw, 3rem);
      gap: 2rem;
      text-align: center;
      overflow-y: auto;
    }

    .game-over-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .game-over-icon {
      font-size: clamp(3rem, 15vw, 5rem);
      animation: scaleIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.5);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .game-over-title {
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), #00eaff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .final-score {
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      font-weight: 700;
      color: var(--text-dim);
    }

    .final-score-number {
      font-size: clamp(2.5rem, 10vw, 4rem);
      font-weight: 900;
      color: var(--accent);
      font-family: 'Courier New', monospace;
    }

    .continue-btn {
      width: clamp(200px, 80vw, 300px);
      padding: clamp(0.9rem, 2vw, 1.2rem);
      min-height: 56px;
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #ff6b35);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 8px 24px rgba(255, 137, 6, 0.3);
      margin-top: 1rem;
    }

    .continue-btn:active {
      transform: scale(0.96);
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* STREAK INDICATOR */
    /* ═══════════════════════════════════════════════════════════════════════ */
    .streak-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: clamp(0.9rem, 3vw, 1.1rem);
      font-weight: 700;
      color: var(--correct);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.75rem 1rem;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.3);
      border-radius: 12px;
      width: fit-content;
      margin: 0 auto;
    }

    .streak-icon {
      font-size: 1.3rem;
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* RESPONSIVE ADJUSTMENTS */
    /* ═══════════════════════════════════════════════════════════════════════ */
    @media (min-width: 600px) {
      .answers-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .header {
        padding: max(1.5rem, env(safe-area-inset-top)) 2rem 1rem;
      }

      #question-screen {
        padding: 2rem;
        max-width: 600px;
        margin: 0 auto;
        width: 100%;
      }

      .question-text {
        font-size: 1.8rem;
      }

      .answer-btn {
        min-height: 60px;
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- HEADER -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div class="header" id="header">
    <div class="header-left" id="player-info">Player</div>
    <div class="header-center" id="room-code">XXXX</div>
    <div class="header-right">
      <div class="score-badge">
        Score: <span id="current-score">0</span>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- READY SCREEN -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div id="ready-screen" class="screen active">
    <div class="ready-content">
      <div class="ready-icon">🧠</div>
      <div class="ready-title">Quiz Game</div>
      <div class="ready-subtitle">Get ready to test your knowledge!</div>
      <div class="countdown" id="countdown">3</div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- QUESTION SCREEN -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div id="question-screen" class="screen">
    <div class="question-counter" id="question-counter">Question 1 of 10</div>

    <div class="timer-display">
      <div class="timer-bar">
        <div class="timer-fill" id="timer-fill"></div>
      </div>
      <div class="timer-text" id="timer-text">60s</div>
    </div>

    <div id="streak-container"></div>

    <div class="question-text" id="question-text">Loading question...</div>

    <div class="answers-grid" id="answers-grid">
      <!-- Answer buttons dynamically inserted -->
    </div>

    <div class="powerups-section" id="powerups-section"></div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- GAME OVER SCREEN -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div id="game-over-screen" class="screen">
    <div class="game-over-content">
      <div class="game-over-icon" id="game-over-icon">🎉</div>
      <div class="game-over-title">Game Over!</div>
      <div class="final-score">
        Final Score
        <div class="final-score-number" id="final-score">0</div>
      </div>
      <button class="continue-btn" id="continue-btn">Return to Lobby</button>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- SCRIPTS -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <script src="/shared/sounds.js"></script>
  <script src="/shared/utils.js"></script>
  <script>
    'use strict';

    // ─── Configuration ──────────────────────────────────────────────
    const ANSWER_LABELS = ['A', 'B', 'C', 'D'];
    const ANSWER_CLASSES = ['a', 'b', 'c', 'd'];

    // ─── State ──────────────────────────────────────────────────────
    let roomCode = '';
    let username = '';
    let myWs = null;
    let gameState = {
      phase: 'LOBBY',
      currentQuestion: null,
      questionIndex: 0,
      totalQuestions: 10,
      players: [],
      timeRemaining: 0,
      questionTimeLimit: 0,
      phaseStartTime: 0
    };
    let myPlayer = {};

    // ─── DOM Elements ──────────────────────────────────────────────
    const roomCodeEl = document.getElementById('room-code');
    const playerInfoEl = document.getElementById('player-info');
    const currentScoreEl = document.getElementById('current-score');
    const readyScreen = document.getElementById('ready-screen');
    const questionScreen = document.getElementById('question-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const countdownEl = document.getElementById('countdown');
    const questionCounterEl = document.getElementById('question-counter');
    const timerFillEl = document.getElementById('timer-fill');
    const timerTextEl = document.getElementById('timer-text');
    const questionTextEl = document.getElementById('question-text');
    const answersGridEl = document.getElementById('answers-grid');
    const powerupsSectionEl = document.getElementById('powerups-section');
    const finalScoreEl = document.getElementById('final-score');
    const continueBtn = document.getElementById('continue-btn');
    const streakContainerEl = document.getElementById('streak-container');

    // ─── Initialization ────────────────────────────────────────────
    function init() {
      roomCode = GN.getRoomCode();
      username = sessionStorage.getItem(`gn-username-${roomCode}`) || 'Player';

      roomCodeEl.textContent = roomCode;
      playerInfoEl.textContent = username.substring(0, 15);

      // Connect WebSocket
      myWs = GN.connectWebSocket(roomCode, 'player', onWsMessage);

      // Event listeners
      continueBtn.addEventListener('click', returnToLobby);
    }

    // ─── WebSocket Message Handler ──────────────────────────────────
    function onWsMessage(msg) {
      if (msg.type === 'GAME_STATE') {
        gameState = msg;
        updateGameDisplay();
      }
    }

    // ─── Update Game Display ────────────────────────────────────────
    function updateGameDisplay() {
      // Find my player data
      myPlayer = gameState.players?.find(p => p.username === username) || {};
      currentScoreEl.textContent = myPlayer.score || 0;

      switch (gameState.phase) {
        case 'COUNTDOWN':
          showReadyScreen();
          break;
        case 'ACTIVE':
          showQuestionScreen();
          break;
        case 'GAME_OVER':
          showGameOverScreen();
          break;
        default:
          showReadyScreen();
      }
    }

    // ─── Ready Screen ──────────────────────────────────────────────
    function showReadyScreen() {
      readyScreen.classList.add('active');
      questionScreen.classList.remove('active');
      gameOverScreen.classList.remove('active');

      // Countdown animation
      const elapsed = Date.now() - (gameState.phaseStartTime || 0);
      const remaining = Math.max(0, 3 - Math.floor(elapsed / 1000));
      countdownEl.textContent = remaining || 'GO!';
    }

    // ─── Question Screen ────────────────────────────────────────────
    function showQuestionScreen() {
      readyScreen.classList.remove('active');
      questionScreen.classList.add('active');
      gameOverScreen.classList.remove('active');

      if (!gameState.currentQuestion) return;

      const q = gameState.currentQuestion;

      // Question counter
      questionCounterEl.textContent = `Question ${gameState.questionIndex + 1} of ${gameState.totalQuestions}`;

      // Timer
      const elapsed = Date.now() - (gameState.phaseStartTime || Date.now());
      const remaining = Math.max(0, gameState.questionTimeLimit - elapsed);
      const percent = (remaining / gameState.questionTimeLimit) * 100;
      timerFillEl.style.width = percent + '%';

      const seconds = Math.ceil(remaining / 1000);
      timerTextEl.textContent = seconds + 's';
      timerTextEl.classList.toggle('warning', seconds <= 10);

      // Question text
      questionTextEl.textContent = q.question;

      // Streak
      if (myPlayer.streak && myPlayer.streak > 0) {
        streakContainerEl.innerHTML = `
          <div class="streak-indicator">
            <span class="streak-icon">🔥</span>
            <span>${myPlayer.streak} streak</span>
          </div>
        `;
      } else {
        streakContainerEl.innerHTML = '';
      }

      // Answer buttons
      answersGridEl.innerHTML = '';
      const answers = q.answers || [];
      answers.forEach((answer, idx) => {
        const btn = document.createElement('button');
        btn.className = `answer-btn ${ANSWER_CLASSES[idx]}`;
        btn.textContent = answer;
        btn.addEventListener('click', () => selectAnswer(idx));
        answersGridEl.appendChild(btn);
      });

      // Power-ups
      renderPowerups();
    }

    // ─── Select Answer ──────────────────────────────────────────────
    function selectAnswer(answerIndex) {
      const btn = answersGridEl.children[answerIndex];
      btn.disabled = true;

      myWs.send(JSON.stringify({
        type: 'ANSWER_QUESTION',
        questionIndex: gameState.questionIndex,
        answerIndex: answerIndex
      }));

      GNSound.select();
    }

    // ─── Power-ups ──────────────────────────────────────────────────
    function renderPowerups() {
      powerupsSectionEl.innerHTML = '';

      if (!myPlayer.powerups) return;

      const powerups = [
        { id: 'doublePoints', label: '2x Points', icon: '⭐' },
        { id: 'fiftyFifty', label: '50/50', icon: '❓' },
        { id: 'timeFreeze', label: '+10s', icon: '⏱️' }
      ];

      for (const pu of powerups) {
        const hasUsed = myPlayer.activePowerup === pu.id;
        const isAvailable = myPlayer.powerups[pu.id] === true;

        const btn = document.createElement('button');
        btn.className = 'powerup-btn';
        btn.disabled = !isAvailable || hasUsed;
        btn.innerHTML = `<span class="powerup-icon">${pu.icon}</span> ${pu.label}`;

        if (isAvailable && !hasUsed) {
          btn.addEventListener('click', () => usePowerup(pu.id));
        }

        powerupsSectionEl.appendChild(btn);
      }
    }

    // ─── Use Power-up ──────────────────────────────────────────────
    function usePowerup(powerupId) {
      myWs.send(JSON.stringify({
        type: 'USE_POWERUP',
        powerupType: powerupId
      }));
      GNSound.pop();
    }

    // ─── Game Over Screen ──────────────────────────────────────────
    function showGameOverScreen() {
      readyScreen.classList.remove('active');
      questionScreen.classList.remove('active');
      gameOverScreen.classList.add('active');

      finalScoreEl.textContent = myPlayer.score || 0;

      // Icon based on score
      const score = myPlayer.score || 0;
      let icon = '🤔';
      if (score > 800) icon = '🏆';
      else if (score > 600) icon = '🎉';
      else if (score > 400) icon = '😊';
      else if (score > 200) icon = '😐';

      document.getElementById('game-over-icon').textContent = icon;
    }

    // ─── Return to Lobby ────────────────────────────────────────────
    function returnToLobby() {
      myWs.send(JSON.stringify({ type: 'RETURN_TO_LOBBY' }));
      GNSound.pop();
    }

    // ─── Initialize on load ────────────────────────────────────────
    init();
  </script>
</body>
</html>
